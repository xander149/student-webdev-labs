<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 01 - Audit</title>
  </head>
  <body>
    <form>
      <label for="name">Name:</label>
      <input type="text", id="name", name="name" /><br /><br />

      <label for="address">Address:<br /></label>
      <input type="text", id="address", name="address" />
      <br /><br />

      <label for="city">City:<br /></label>
      <input type="text", id="city", name="city" />
      <br /><br />

      <label for="zip">Zip Code:<br /></label>      
      <input type="text", id="zip", name="zip" />
      <br /><br />

      <fieldset>
        <legend>Credit Card Type:</legend>     
          <input type="radio" id="visa" name="card" value="visa">
          <label for="visa">Visa</label>
          <input type="radio" id="masterCard" name="card" value="masterCard">
          <label for="masterCard">MasterCard</label>
          <input type="radio" id="americanExpress" name="card" value="americanExpress">
          <label for="americanExpress">American Express</label>
      </fieldset>

      <label for="cc-number">Credit Card Number:<br /></label>
      <input type="text", id="cc-number", name="cc-number" /><br /><br />

      <label for="cvv">CVV:<br /></label>
      <input type="text", id="cvv" name="cvv" /><br /><br />

      <button type="submit">Submit</button>
    </form>
  </body>
</html>
